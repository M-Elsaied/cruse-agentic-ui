name: Test

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && github.ref != 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    container:
      image: python:3.13-slim

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          apt-get update && apt-get install -y shellcheck make
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements-build.txt
          pip install -r requirements.txt

      - name: Show installed packages
        shell: bash
        run: |
          source venv/bin/activate 
          pip freeze

      - name: Run make lint-check
        # We run this check-only step to break the build if
        # formatting changes are needed
        shell: bash
        run: |
          source venv/bin/activate 
          make lint-check

      - name: Run make test
        shell: bash
        run: |
          source venv/bin/activate 
          make test
        env:
          AGENT_TOOL_PATH: "./neuro_san/coded_tools"
          PYTHONPATH: ${{ env.PYTHONPATH }}:"."

      - name: Check README renders correctly on PyPI
        shell: bash
        run: |
          source venv/bin/activate
          pip install readme_renderer readme_renderer[md]
          python -m readme_renderer README.md
