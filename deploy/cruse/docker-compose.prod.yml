version: "3.8"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

  backend:
    build:
      context: ../../
      dockerfile: apps/cruse/Dockerfile.backend
    expose:
      - "5001"
    environment:
      - AGENT_MANIFEST_FILE=registries/manifest.hocon
      - AGENT_TOOL_PATH=coded_tools
      - PYTHONPATH=/app
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_ISSUER_URL=${CLERK_ISSUER_URL:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost}
      - DATABASE_URL=postgresql+asyncpg://cruse:${POSTGRES_PASSWORD}@postgres:5432/cruse
      - FERNET_KEY=${FERNET_KEY:-}
      - MAX_DAILY_REQUESTS=${MAX_DAILY_REQUESTS:-50}
      - FGA_API_URL=http://openfga:8080
      - FGA_STORE_NAME=${FGA_STORE_NAME:-cruse}
      - FGA_POLICY_FILE=plugins/authorization/openfga/sample_authorization_model.json
    volumes:
      - ../../registries:/app/registries:ro
      - ../../coded_tools:/app/coded_tools:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      openfga:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 3G
    restart: unless-stopped

  frontend:
    build:
      context: ../../apps/cruse/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_URL:-/sign-in}
        NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_URL:-/sign-up}
    expose:
      - "3000"
    environment:
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cruse
      POSTGRES_USER: cruse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-openfga-db.sh:/docker-entrypoint-initdb.d/init-openfga-db.sh:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cruse"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

  openfga:
    image: openfga/openfga:latest
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://cruse:${POSTGRES_PASSWORD}@postgres:5432/openfga
    expose:
      - "8080"
      - "8081"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

volumes:
  pgdata:
